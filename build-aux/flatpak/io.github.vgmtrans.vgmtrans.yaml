app-id: io.github.vgmtrans.vgmtrans
runtime: org.kde.Platform
runtime-version: '6.10'
sdk: org.kde.Sdk
command: vgmtrans
finish-args:
  # Display and Audio
  - --socket=wayland
  - --socket=fallback-x11
  - --socket=pulseaudio
  # For hw accel
  - --share=ipc
  - --device=dri

modules:
  - name: xz
    buildsystem: autotools
    config-opts:
      - --disable-xz
      - --disable-xzdec
      - --disable-lzmadec
      - --disable-lzmainfo
      - --disable-scripts
      - --disable-doc
    sources:
      - type: archive
        url: https://github.com/tukaani-project/xz/releases/download/v5.8.3/xz-5.8.3.tar.gz
        sha256: 3d3a1b973af218114f4f889bbaa2f4c037deaae0c8e815eec381c3d546b974a0

  - name: VGMTrans
    buildsystem: cmake-ninja
    config-opts:
      - -DCMAKE_BUILD_TYPE=Release
      - -DENABLE_UI_QT=ON
      - -DENABLE_CLI=OFF
      - -DENABLE_SHELL=OFF
      - -DNO_QT_DEPLOY=ON
      - -DINSTALL_CHANGELOG=ON
      - -DUSE_SYSTEM_ZLIB=ON
      - -DUSE_SYSTEM_LZMA=ON
      - -DVGMTRANS_DATA_DIR=/app/share/vgmtrans
    sources:
      - type: dir
        path: ../../
